<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Hello Chat</title>
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-[#D20062] text-slate-200 font-sans antialiased">

    <div class="flex h-screen max-w-6xl mx-auto p-4 lg:p-6 gap-6">

        <aside class="hidden md:flex flex-col w-64 bg-[#111827]/50 backdrop-blur-xl border border-slate-800/50 rounded-2xl p-4">
            <div class="flex items-center gap-3 px-2 mb-8">
                <div class="w-3 h-3 rounded-full bg-[#FE9EC7] animate-pulse"></div>
                <h1 class="font-bold text-xl bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">HelloChat</h1>
            </div>
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 bg-slate-800/50 text-white px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
                    <span class="text-[#FE9EC7]">#</span> general-chat
                </a>
                <a href="#" class="flex items-center gap-3 text-slate-400 hover:bg-slate-800/30 hover:text-slate-200 px-3 py-2.5 rounded-xl text-sm font-medium transition-all">
                    <span class="text-slate-600">#</span> random
                </a>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col bg-[#111827]/50 backdrop-blur-xl border border-slate-800/50 rounded-2xl overflow-hidden">
            
            <header class="flex items-center justify-between px-6 py-4 border-b border-slate-800/50 bg-[#111827]/30">
                <div>
                    <h2 class="font-semibold text-white"># general-chat</h2>
                    <p class="text-xs text-[#FE9EC7] flex items-center gap-1.5 mt-0.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-[#FE9EC7]"></span> WebSocket Connected
                    </p>
                </div>
            </header>

            <ul id="messages" class="flex-1 overflow-y-auto p-6 space-y-4">
                <li class="text-center">
                    <span class="text-xs text-slate-500 bg-slate-800/30 px-3 py-1 rounded-full">Welcome to the void. Say hello!</span>
                </li>
            </ul>

            <div class="p-4 border-t border-slate-800/50 bg-[#434E78]/30">
                <div class="relative flex items-center bg-slate-800/40 border border-slate-700/50 focus-within:border-pink-500/50 focus-within:ring-1 focus-within:ring-pink-500/20 rounded-xl transition-all">
                    
                    <input 
                        id="msg" 
                        type="text" 
                        placeholder="Message #general-chat..." 
                        class="w-full bg-transparent py-3.5 px-4 text-sm text-white placeholder-slate-500 outline-none"
                        onkeypress="if(event.key === 'Enter') sendMessage()"
                    />

                    <div class="pr-3 flex items-center gap-2">
                        <button 
                            onclick="sendMessage()" 
                            class="bg-[#FE9EC7] hover:bg-[#FE9EC7]/80 text-slate-900 font-semibold text-xs py-1.5 px-4 rounded-lg transition-all active:scale-95"
                        >
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const ws = new WebSocket("ws://localhost:8080/ws");
        const messagesContainer = document.getElementById("messages");

        ws.onmessage = function(event) {
            const li = document.createElement("li");
            
            let messageText = event.data;
            try {
                const parsed = JSON.parse(event.data);
                if (typeof parsed === 'string') messageText = parsed;
            } catch (e) {
            }

            li.innerHTML = `
                <div class="flex items-start gap-3 group">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-emerald-400 flex items-center justify-center text-xs font-bold text-white shadow-lg shadow-emerald-500/10">
                        U
                    </div>
                    <div class="flex flex-col">
                        <div class="flex items-baseline gap-2">
                            <span class="font-medium text-sm text-white">User</span>
                            <span class="text-[10px] text-slate-600 group-hover:text-slate-500 transition-colors">Just now</span>
                        </div>
                        <p class="text-sm text-slate-300 mt-0.5 bg-slate-800/40 px-3 py-2 rounded-2xl rounded-tl-none border border-slate-700/30 max-w-md break-words">
                            ${escapeHtml(messageText)}
                        </p>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(li);

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        function sendMessage() {
            const input = document.getElementById("msg");
            if (!input.value.trim()) return;
            ws.send(JSON.stringify(input.value));
            input.value = "";
        }
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>

</body>
</html>
